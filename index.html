<script>
const params = new URLSearchParams(window.location.search);
const VIDEO_ID = params.get("id") || "";

const video = document.getElementById("video");
const baseUrl = "https://cdn2.videy.co/";

function loadVideo(extension = ".mp4") {
  if (!VIDEO_ID) {
    video.innerHTML = '<p style="color:white; text-align:center; padding:40px;">No video ID provided (gunakan ?id=xxx di URL)</p>';
    return;
  }
  const source = baseUrl + VIDEO_ID + extension;
  video.src = source;
  video.load();
  console.log("Mencoba load:", source);
}

if (VIDEO_ID) {
  loadVideo(".mp4");

  video.onerror = () => {
    if (!video.dataset.triedFallback) {
      video.dataset.triedFallback = "true";
      console.warn("Gagal mp4 → coba .mov");
      loadVideo(".mov");
    } else {
      video.innerHTML = '<p style="color:white; text-align:center; padding:40px;">Video tidak ditemukan atau ID salah</p>';
    }
  };
}
</script>
