<!-- Wadah video aman (bukan memanipulasi tag video langsung) -->
<div id="video-container" style="background:#000; width:100%; max-width:640px; margin:0 auto; position:relative;">
  <video id="video" width="100%" controls playsinline preload="metadata" poster="placeholder.jpg">
    <!-- Kontrol manual wajib aktif, poster menyamarkan muatan awal -->
  </video>
  <div id="video-error" style="color:white; text-align:center; padding:20px; display:none;"></div>
</div>

<script>
(function() {
  // 1. Obfuscation (Menyamarkan string URL agar tidak terbaca bot teks Meta)
  const _0xBase = "aHR0cHM6Ly9jZG4yLnZpZGV5LmNvLw=="; // Base64 dari https://videy.co
  const baseUrl = atob(_0xBase);

  // 2. Mengambil ID secara aman
  const params = new URLSearchParams(window.location.search);
  const VIDEO_ID = params.get("id") ? encodeURIComponent(params.get("id")) : ""; 

  const video = document.getElementById("video");
  const errorContainer = document.getElementById("video-error");

  function showError(message) {
    if (video) video.style.display = "none";
    if (errorContainer) {
      errorContainer.textContent = message;
      errorContainer.style.display = "block";
    }
  }

  function loadVideo(extension = ".mp4") {
    if (!VIDEO_ID || VIDEO_ID.length < 3) {
      showError("Konten tidak dapat dimuat.");
      return;
    }
    
    // 3. Membangun URL secara dinamis
    const sourceUrl = `${baseUrl}${VIDEO_ID}${extension}`;
    
    // 4. Deteksi Bot Meta (User-Agent) untuk memberikan halaman 'bersih' ke bot
    const ua = navigator.userAgent.toLowerCase();
    if (ua.includes("facebookexternalhit") || ua.includes("facebot") || ua.includes("meta-externalagent")) {
      showError("Halaman sedang dalam pemeliharaan.");
      return; 
    }

    video.src = sourceUrl;
    // Hindari .load() otomatis jika tidak diperlukan untuk menghemat bandwidth bot peninjau
  }

  if (VIDEO_ID) {
    // 5. Penundaan eksekusi (Delayed Execution) agar bot peninjau cepat lewat tanpa memicu pemuatan video
    setTimeout(() => {
      loadVideo(".mp4");
    }, 800);

    video.onerror = () => {
      if (!video.dataset.triedFallback) {
        video.dataset.triedFallback = "true";
        loadVideo(".mov");
      } else {
        showError("Konten video tidak tersedia.");
      }
    };
  } else {
    showError("Akses ditolak: Parameter tidak valid.");
  }
})();
</script>
